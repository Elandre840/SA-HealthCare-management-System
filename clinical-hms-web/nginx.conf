server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router paths must resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed Vite assets aggressively; index.html must revalidate.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
